<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Parking System - Login</title>

<style>
body{
    margin:0;
    font-family:Segoe UI, sans-serif;
    background:#f5f7fb;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    width:380px;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 8px 25px rgba(0,0,0,0.08);
}

h2{
    text-align:center;
    margin-bottom:20px;
    color:#1e293b;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #d1d5db;
    border-radius:10px;
    font-size:14px;
}

input:focus{
    outline:none;
    border-color:#2563eb;
}

button{
    width:100%;
    padding:12px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:10px;
    font-size:15px;
    cursor:pointer;
    margin-top:10px;
}

button:hover{
    background:#1d4ed8;
}

.text{
    text-align:center;
    margin-top:15px;
    font-size:14px;
}

.text a{
    color:#2563eb;
    text-decoration:none;
}
</style>

</head>

<body>

<div class="card">

    <h2>Smart Parking Login</h2>

    <form id="loginForm">

        <input type="email" id="email" placeholder="Email" required>

        <input type="password" id="password" placeholder="Password" required>

        <button type="submit">Login</button>

    </form>

    <div class="text">
        Don't have an account?
        <a href="signup.html">Sign up</a>
    </div>

</div>

<script type="module" src="js/login.js"></script>

</body>
</html>
